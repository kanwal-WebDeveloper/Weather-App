<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Weather Utility</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <div class="card-inner">
            <div class="header-area">
                <div class="brand">
                    <h1><i class="fas fa-cloud-sun"></i> Weather Utility</h1>
                    <p>Designed & Developed by Kanwal Imran</p>
                </div>
                <div class="search-wrapper">
                    <input type="text" id="cityInput" placeholder="City name" spellcheck="false">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="error-msg" id="errorBox">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText">Invalid city name</span>
            </div>
            <div id="weatherContent">
                <div class="loading-placeholder">
                    <i class="fas fa-cloud-sun" style="font-size: 2rem; opacity: 0.6;"></i>
                    <p>Detecting your location...</p>
                </div>
            </div>
            <footer>
                <i class="fas fa-map-marker-alt"></i> Real-time data · OpenWeather + Open-Meteo
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
